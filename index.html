function showDialog(i){$('#dlgTitle').textContent=i.ico+' '+i.name;$('#dlgBody').textContent=i.short;$('#dlgMore').textContent=i.more;$('#dlgMore').classList.add('hidden');$('#moreBtn').textContent='もっと知る';$('#dialog').classList.remove('hidden')}
function notify(t){const n=$('#notice');n.textContent=t;n.classList.add('show');clearTimeout(noticeTimer);noticeTimer=setTimeout(()=>n.classList.remove('show'),2200)}
function updateHUD(){const f=missionOrder.filter(x=>state.found.has(x)).length;$('#place').textContent=currentZone();$('#found').textContent=`発見 ${f}/${missionOrder.length}`;$('#prog').style.width=(f/missionOrder.length*100)+'%'}
function shade(hex,f){const n=parseInt(hex.slice(1),16),r=Math.max(0,Math.min(255,(n>>16)*f)),g=Math.max(0,Math.min(255,((n>>8)&255)*f)),b=Math.max(0,Math.min(255,(n&255)*f));return `rgb(${r|0},${g|0},${b|0})`}
function raycast(){const s=scene(),sky=s.sky,fl=s.floor;ctx.fillStyle=sky;ctx.fillRect(0,0,W,H/2);ctx.fillStyle=fl;ctx.fillRect(0,H/2,W,H/2);const strips=Math.max(160,Math.floor(W/(state.quality===2?2:4))),sw=W/strips;const zbuf=new Float32Array(strips);
for(let col=0;col<strips;col++){const ra=state.a-state.fov/2+(col/strips)*state.fov,dx=Math.cos(ra),dy=Math.sin(ra);let mapX=Math.floor(state.x),mapY=Math.floor(state.y),deltaX=Math.abs(1/(dx||.0001)),deltaY=Math.abs(1/(dy||.0001)),stepX,stepY,sideX,sideY;if(dx<0){stepX=-1;sideX=(state.x-mapX)*deltaX}else{stepX=1;sideX=(mapX+1-state.x)*deltaX}if(dy<0){stepY=-1;sideY=(state.y-mapY)*deltaY}else{stepY=1;sideY=(mapY+1-state.y)*deltaY}let hit='0',side=0,guard=0;while(hit==='0'&&guard++<80){if(sideX<sideY){sideX+=deltaX;mapX+=stepX;side=0}else{sideY+=deltaY;mapY+=stepY;side=1}hit=(s.map[mapY]&&s.map[mapY][mapX])||'1'}let dist=side===0?(mapX-state.x+(1-stepX)/2)/(dx||.0001):(mapY-state.y+(1-stepY)/2)/(dy||.0001);dist*=Math.cos(ra-state.a);zbuf[col]=dist;const h=Math.min(H*2,H/(dist*.72)),top=(H-h)/2;let color=s.walls[hit]||'#cdd4d1';let factor=Math.max(.25,1-dist/24)*(side?.76:1);ctx.fillStyle=shade(color,factor);ctx.fillRect(col*sw,top,sw+1,h);if(dist<8){ctx.fillStyle=`rgba(255,255,255,${Math.max(0,.07-dist*.007)})`;ctx.fillRect(col*sw,top,1,h)}}
renderSprites(zbuf,strips,sw);renderEffects();}
function renderSprites(zbuf,strips,sw){const arr=scene().items.map(i=>{const dx=i.x-state.x,dy=i.y-state.y;return{i,dist:Math.hypot(dx,dy),ang:Math.atan2(dy,dx)-state.a}}).sort((a,b)=>b.dist-a.dist);for(const o of arr){let ang=o.ang;while(ang>Math.PI)ang-=Math.PI*2;while(ang<-Math.PI)ang+=Math.PI*2;if(Math.abs(ang)>state.fov*.75||o.dist<.2)continue;const sx=(.5+ang/state.fov)*W,size=Math.min(H*.45,H/(o.dist*.85)),col=Math.floor(sx/sw);if(col<0||col>=strips||o.dist>zbuf[col]+.2)continue;ctx.save();ctx.textAlign='center';ctx.textBaseline='middle';ctx.font=`${Math.max(18,size*.52)}px sans-serif`;ctx.shadowColor='#000';ctx.shadowBlur=8*DPR;ctx.fillText(o.i.ico,sx,H/2+size*.05);if(o.dist<2.8){ctx.font=`bold ${Math.max(11,size*.12)}px sans-serif`;ctx.fillStyle='#effcff';ctx.fillText(o.i.name,sx,H/2+size*.48)}ctx.restore()}}
function renderEffects(){if(scene().ambient==='bubbles'){const t=performance.now()/1000;ctx.save();for(let i=0;i<30;i++){const x=((i*97+t*26)%W),y=H-((i*61+t*(25+i%5)*DPR)%H*.8),r=(2+i%4)*DPR;ctx.strokeStyle=`rgba(169,238,255,${.18+(i%3)*.08})`;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.stroke()}ctx.restore()}if(scene().ambient==='flow'||scene().ambient==='river'){ctx.save();ctx.strokeStyle='#b5edff44';ctx.lineWidth=2*DPR;const t=performance.now()*.08;for(let i=0;i<12;i++){let y=H*.6+i*16*DPR;ctx.beginPath();ctx.moveTo((t+i*70)%W-100,y);ctx.lineTo((t+i*70)%W+80,y);ctx.stroke()}ctx.restore()}}
function control(dt){if(!state.playing||state.paused)return;const run=keys.shift?1.7:1,sp=state.speed*dt*60*run;let f=(keys.w?1:0)-(keys.s?1:0),st=(keys.d?1:0)-(keys.a?1:0);f+=joyY*-1;st+=joyX;const len=Math.hypot(f,st);if(len>1){f/=len;st/=len}let nx=state.x+(Math.cos(state.a)*f+Math.cos(state.a+Math.PI/2)*st)*sp,ny=state.y+(Math.sin(state.a)*f+Math.sin(state.a+Math.PI/2)*st)*sp;if(!blocked(nx,state.y))state.x=nx;if(!blocked(state.x,ny))state.y=ny;updateNear();updateHUD()}
function loop(ts){const dt=Math.min(2.5,(ts-last)/16.667||1);last=ts;if(state.playing&&!state.paused){control(dt);raycast()}requestAnimationFrame(loop)}requestAnimationFrame(loop);
function startGame(){state.playing=true;state.paused=false;$('#start').classList.add('hidden');$('#hud,#menuBtn,#stick,.mobileHint').forEach?.(()=>{});$('#hud').classList.remove('hidden');$('#menuBtn').classList.remove('hidden');$('#stick').classList.remove('hidden');$('.mobileHint').classList.remove('hidden');cv.focus();notify('シンクを探して、排水の旅を始めよう');updateHUD()}
$('#startBtn').addEventListener('click',startGame);$('#startBtn').addEventListener('touchend',e=>{e.preventDefault();startGame()},{passive:false});
addEventListener('keydown',e=>{const k=e.key.toLowerCase();if(['w','a','s','d','shift'].includes(k))keys[k]=1;if(k==='e')interact();if(k==='escape'&&state.playing)toggleMenu();});addEventListener('keyup',e=>keys[e.key.toLowerCase()]=0);
let drag=null;cv.addEventListener('pointerdown',e=>{if(e.clientX<W/DPR*.32&&matchMedia('(pointer:coarse)').matches)return;drag={x:e.clientX};cv.setPointerCapture(e.pointerId)});cv.addEventListener('pointermove',e=>{if(!drag||state.paused)return;state.a+=(e.clientX-drag.x)*.006;drag.x=e.clientX});cv.addEventListener('pointerup',()=>drag=null);cv.addEventListener('pointercancel',()=>drag=null);$('#interact').addEventListener('pointerdown',e=>{e.preventDefault();interact()});
let joyX=0,joyY=0,joyId=null;const stick=$('#stick'),knob=$('#knob');function joy(e){const r=stick.getBoundingClientRect(),p=[...e.touches].find(x=>x.identifier===joyId)||e.changedTouches?.[0];if(!p)return;let x=p.clientX-(r.left+r.width/2),y=p.clientY-(r.top+r.height/2),m=Math.hypot(x,y),lim=42;if(m>lim){x=x/m*lim;y=y/m*lim}joyX=x/lim;joyY=y/lim;knob.style.transform=`translate(${x}px,${y}px)`}stick.addEventListener('touchstart',e=>{joyId=e.changedTouches[0].identifier;joy(e);e.preventDefault()},{passive:false});stick.addEventListener('touchmove',e=>{joy(e);e.preventDefault()},{passive:false});function joyEnd(){joyX=joyY=0;joyId=null;knob.style.transform=''}stick.addEventListener('touchend',joyEnd);stick.addEventListener('touchcancel',joyEnd);
function toggleMenu(tab='missions'){state.paused=!state.paused;$('#menu').classList.toggle('hidden',!state.paused);if(state.paused)renderTab(tab)}$('#menuBtn').onclick=()=>toggleMenu();$('#resume').onclick=()=>toggleMenu();$('#restart').onclick=()=>{localStorage.removeItem('jokasoSave');location.reload()};
$$('[data-tab]').forEach(b=>b.onclick=()=>{$$('[data-tab]').forEach(x=>x.classList.toggle('on',x===b));renderTab(b.dataset.tab)});$('#openBook0').onclick=()=>{$('#start').classList.add('hidden');state.paused=true;$('#menu').classList.remove('hidden');renderTab('book')};$('#openSettings0').onclick=()=>{$('#start').classList.add('hidden');state.paused=true;$('#menu').classList.remove('hidden');renderTab('settings')};
function renderTab(tab){$$('[data-tab]').forEach(x=>x.classList.toggle('on',x.dataset.tab===tab));const c=$('#tabContent');if(tab==='missions'){c.innerHTML='<h2 class="panelTitle">探検ミッション</h2>'+missionOrder.map((id,n)=>`<div class="mission ${state.found.has(id)?'done':''}"><span class="check"></span><div><b>${n+1}. ${missionText[id]}</b><small>${state.found.has(id)?'発見済み':'まだ見つけていません'}</small></div></div>`).join('')}else if(tab==='book'){const ids=Object.keys(itemDefs);c.innerHTML='<h2 class="panelTitle">設備図鑑</h2><div class="ency">'+ids.map(id=>{const i=itemDefs[id],on=state.found.has(id);return`<div class="entry ${on?'':'lock'}"><span class="ico">${on?i.ico:'？'}</span><b>${on?i.name:'未発見'}</b><small>${on?i.short:'探検して設備を見つけよう。'}</small></div>`}).join('')+'</div>'}else{c.innerHTML=`<h2 class="panelTitle">設定</h2><div class="mission"><div><b>移動速度</b><small>操作しづらい場合は「ゆっくり」を選んでください。</small></div></div><div class="gridBtns"><button class="secondary speed" data-v=".032">ゆっくり</button><button class="secondary speed" data-v=".045">標準</button></div><div class="mission"><div><b>描画品質</b><small>スマホで重い場合は軽量を選択してください。</small></div></div><div class="gridBtns"><button class="secondary quality" data-v="1">軽量</button><button class="secondary quality" data-v="2">高画質</button></div><p class="tiny">このゲームは教材用デフォルメです。実際の入槽作業には酸欠・硫化水素など重大な危険があります。</p>`;$$('.speed').forEach(b=>b.onclick=()=>{state.speed=+b.dataset.v;save();notify('移動速度を変更しました')});$$('.quality').forEach(b=>b.onclick=()=>{state.quality=+b.dataset.v;save();notify('描画品質を変更しました')})}}
$('#dialog .close').onclick=()=>$('#dialog').classList.add('hidden');$('#moreBtn').onclick=()=>{const d=$('#dlgMore'),h=d.classList.toggle('hidden');$('#moreBtn').textContent=h?'もっと知る':'閉じる'};
function showFinish(){state.paused=true;$('#menu').classList.remove('hidden');$('#tabContent').innerHTML=`<h2 class="panelTitle">🎉 水の旅、完了！</h2><p style="line-height:1.9;color:#c8dce2">家から流れた水は、浄化槽の中で固形物を分離し、微生物の力で汚れを減らし、消毒されて川へ戻りました。</p><div class="model"><b>今回たどった処理順</b><small>固液分離貯留槽 → 嫌気ろ床槽 → 生物ろ過槽 → 処理水槽 → 消毒槽 → 放流</small></div><p class="tiny">浄化槽は設置して終わりではなく、保守点検・清掃・法定検査によって性能が保たれます。</p>`}
function save(){try{localStorage.setItem('jokasoSave',JSON.stringify({found:[...state.found],speed:state.speed,quality:state.quality}))}catch{}}
function load(){try{const x=JSON.parse(localStorage.getItem('jokasoSave'));if(x){state.found=new Set(x.found||[]);state.speed=x.speed||state.speed;state.quality=x.quality||state.quality}}catch{}}load();
})();
</script>

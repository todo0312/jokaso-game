function model(){return MODELS[modelId]}function segs(){let x=0;return model().segments.map((s,i)=>{const o={i,name:s[0],w:s[1],type:s[2],desc:s[3],items:s[4],x0:x,x1:x+s[1]};x+=s[1];return o})}function total(){return model().width}

function updateHud(force=false){const c=current(),m=model();if(!force&&updateHud.k===modelId+':'+c.i)return;updateHud.k=modelId+':'+c.i;$('maker').textContent=m.maker;$('zone').textContent=c.name;$('fill').style.width=c.pct+'%';$('found').textContent='発見 '+discovered.size+'/'+allItems().length;$('route').textContent=m.name+' / '+m.dims;renderMission()}

function openingFor(i,z){const patterns=[1.05,1.82,1.38,1.72];const center=patterns[i%patterns.length];return Math.abs(z-center)<.29}

function control(dt){if(!playing||view==='section')return;const sp=(running?3.7:2.25)*dt,f=(keys.f?1:0)-(keys.b?1:0),side=(keys.r?1:0)-(keys.l?1:0);let dx=(Math.cos(yaw)*f-Math.sin(yaw)*side)*sp,dz=(Math.sin(yaw)*f+Math.cos(yaw)*side)*sp,l=Math.hypot(dx,dz);if(l>sp){dx*=sp/l;dz*=sp/l}tryMove(player.x+dx,player.z+dz)}
